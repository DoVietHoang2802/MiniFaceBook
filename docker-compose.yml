version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: miniface-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:latest
    container_name: miniface-redis
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:latest
    container_name: miniface-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data

volumes:
  mongodb_data:
  neo4j_data:
