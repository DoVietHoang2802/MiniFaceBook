services:
  mongodb:
    image: mongo:latest
    container_name: miniface-mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    # Chạy ở chế độ Replica Set (rs0) để hỗ trợ Multi-document Transactions.
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      # Tự động khởi tạo replica set 1 lần khi container sẵn sàng.
      # Dùng host:port khớp với port nội bộ 27017 để cấu hình replica set ổn định.
      test: >
        mongosh --quiet --eval "
          try { rs.status().ok }
          catch (e) {
            rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] }).ok
          }
        "
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  redis:
    image: redis:latest
    container_name: miniface-redis
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:latest
    container_name: miniface-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

volumes:
  mongodb_data:
