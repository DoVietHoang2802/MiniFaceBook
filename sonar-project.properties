# SonarQube Project Configuration for MiniFaceBook Monorepo
sonar.organization=doviethoang2802
sonar.projectKey=DoVietHoang2802_MiniFaceBook
sonar.projectName=MiniFaceBook
sonar.projectVersion=1.0

# Sources
sonar.sources=backend/src/main/java,frontend/src
sonar.tests=backend/src/test/java,frontend/tests

# Language-specific
sonar.java.source=21
sonar.java.binaries=backend/target/classes
sonar.java.test.binaries=backend/target/test-classes

# Frontend (TypeScript/React) — no unit tests yet, only Playwright E2E
# sonar.typescript.lcov.reportPaths will be added when frontend unit tests exist

# Exclusions (generated code, test files, build artifacts)
sonar.exclusions=backend/src/main/java/com/minifacebook/module/post/infrastructure/mapper/**/*,\
  frontend/src/modules/core/services/sseService.ts,\
  **/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,\
  **/node_modules/**,**/target/**,**/dist/**,**/coverage/**

# Coverage exclusions (mapper-generated code, DTOs, type definitions)
sonar.coverage.exclusions=backend/src/main/java/com/minifacebook/module/**/dto/**/*,\
  backend/src/main/java/com/minifacebook/module/**/mapper/**/*,\
  frontend/src/modules/**/types.ts,\
  frontend/src/modules/**/services/*Service.ts

# Duplication exclusions (DTOs and mappers are typically boilerplate)
sonar.cpd.exclusions=backend/src/main/java/com/minifacebook/module/**/dto/**/*,\
  backend/src/main/java/com/minifacebook/module/**/mapper/**/*
