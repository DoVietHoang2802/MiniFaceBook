server:
  port: 8080
  servlet:
    context-path: /api

spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 25MB
  application:
    name: minifacebook-backend
  
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://127.0.0.1:27018/miniface_db?directConnection=true}
      auto-index-creation: true
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}

  mail:
    host: ${SMTP_HOST:127.0.0.1}
    port: ${SMTP_PORT:1025}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  # Cấu hình Mongock cho Migration
  mongock:
    migration-scan-package:
      - com.minifacebook.infrastructure.persistence.migrations
    enabled: true

# Cấu hình Swagger / OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /docs
    operations-sorter: method
    tags-sorter: alpha

# Logging cấu hình cơ bản
logging:
  level:
    root: INFO
    com.minifacebook: DEBUG
    org.springframework.data.mongodb: DEBUG

# Sentry error tracking (Sprint 6.5)
# Để trống SENTRY_DSN = tắt (local/CI không spam). Production: set env SENTRY_DSN.
sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:local}
  send-default-pii: false
  traces-sample-rate: 0.0
  logging:
    minimum-event-level: error
    minimum-breadcrumb-level: warn

# Spring Boot Actuator (Sprint 6.5) — chỉ health, không lộ env/beans
# URL: http://localhost:8080/api/actuator/health  (context-path /api)
# show-details=never: public chỉ thấy UP/DOWN tổng (an toàn).
# Muốn chi tiết mongo/redis: xem ghi chú MANAGEMENT_HEALTH_SHOW_DETAILS bên dưới / docs.
management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /actuator
  endpoint:
    health:
      show-details: never
  health:
    # Mongo + Redis vẫn góp vào status tổng (DOWN nếu dependency chết)
    # Chi tiết từng component không lộ ra public
    mongo:
      enabled: true
    redis:
      enabled: true

# Cấu hình Security & JWT
app:
  jwt:
    # Ưu tiên lấy từ biến môi trường JWT_SECRET, nếu không có mới dùng chuỗi mặc định (chỉ cho dev)
    secret: ${JWT_SECRET:vM6Yp9Xz2B8nL5K3rJ7hG4dF1sA0qW2eR5tY8uI1oP4aS7dF0gH3jK6lL9zX}
    access-token-expiration: 3600 # 1 giờ (giây)
    refresh-token-expiration: 604800 # 7 ngày (giây)
  resend:
    api-key: ${RESEND_API_KEY:re_123456789}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:demo}
    api-key: ${CLOUDINARY_API_KEY:1234567890}
    api-secret: ${CLOUDINARY_API_SECRET:abcdefghijklmnopqrstuvwxyz}
