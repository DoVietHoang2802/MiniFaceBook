name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Start Docker Compose Services
        run: docker compose up -d

      - name: Wait for MongoDB Healthcheck
        run: |
          echo "Waiting for MongoDB to be healthy..."
          until [ "$(docker inspect --format='{{.State.Health.Status}}' miniface-mongodb)" = "healthy" ]; do
            echo "Current MongoDB Status: $(docker inspect --format='{{.State.Health.Status}}' miniface-mongodb)"
            sleep 5
          done
          echo "MongoDB is healthy!"

      - name: Wait for Mailpit
        run: |
          echo "Waiting for Mailpit..."
          for i in {1..30}; do
            if curl -sf http://localhost:8025/api/v1/info > /dev/null; then
              echo "Mailpit is up!"
              exit 0
            fi
            echo "Waiting for Mailpit (Attempt $i/30)..."
            sleep 2
          done
          echo "Mailpit failed to start"
          docker compose logs mailpit
          exit 1

      - name: Build and Test Backend
        run: |
          cd backend
          mvn clean package

      - name: Run Backend Server in Background
        run: |
          cd backend
          nohup java -jar target/*.jar > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Wait for Backend Server Port 8080
        run: |
          echo "Waiting for Backend Server to start..."
          for i in {1..40}; do
            if curl -s http://localhost:8080/api/docs > /dev/null; then
              echo "Backend Server is up and running!"
              exit 0
            fi
            echo "Waiting for API Docs endpoint (Attempt $i/40)..."
            sleep 3
          done
          echo "Backend Server failed to start! Printing logs:"
          cat backend/backend.log
          exit 1

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Run Playwright E2E Tests
        env:
          CI: true
        run: |
          cd frontend
          npx playwright test --reporter=list,html

      - name: Upload Playwright Test Report on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 14

      - name: Upload Backend Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-logs
          path: backend/backend.log
          retention-days: 7
          if-no-files-found: ignore

      - name: SonarCloud Scan
        if: always() && env.SONAR_TOKEN != ''
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=DoVietHoang2802_MiniFaceBook
            -Dsonar.organization=doviethoang2802
            -Dsonar.branch.name=${{ github.head_ref || github.ref_name }}

      - name: SonarCloud Quality Gate Check
        if: success() && env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-quality-gate-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        timeout-minutes: 5
