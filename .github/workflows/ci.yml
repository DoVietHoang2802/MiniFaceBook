name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Java Environment (JDK 21)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Setup Node.js Environment (Node.js 20)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      # 4. Start Docker Compose services (MongoDB Replica Set, Redis, Mailpit)
      - name: Start Docker Compose Services
        run: |
          docker compose up -d

      # 5. Wait for MongoDB to be healthy (specifically rs0 replica set initiation)
      - name: Wait for MongoDB Healthcheck
        run: |
          echo "Waiting for MongoDB to be healthy..."
          until [ "$(docker inspect --format='{{.State.Health.Status}}' miniface-mongodb)" = "healthy" ]; do
            echo "Current MongoDB Status: $(docker inspect --format='{{.State.Health.Status}}' miniface-mongodb)"
            sleep 5
          done
          echo "MongoDB is healthy!"

      # 6. Build and Test Backend (Runs checkstyle, unit and integration tests)
      - name: Build and Test Backend
        run: |
          cd backend
          mvn clean test

      # 7. Start Backend Server in Background for Playwright E2E tests
      - name: Run Backend Server in Background
        run: |
          cd backend
          nohup mvn spring-boot:run > backend.log 2>&1 &
          echo $! > backend.pid

      # 8. Wait for Backend Server to be Ready (port 8080 API docs)
      - name: Wait for Backend Server Port 8080
        run: |
          echo "Waiting for Backend Server to start..."
          until curl -s http://localhost:8080/api/docs > /dev/null; do
            echo "Waiting for API Docs endpoint..."
            sleep 5
          done
          echo "Backend Server is up and running!"

      # 9. Install Frontend Dependencies
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      # 10. Install Playwright Browsers & dependencies
      - name: Install Playwright Browsers
        run: |
          cd frontend
          npx playwright install --with-deps

      # 11. Run Playwright E2E Tests
      - name: Run Playwright E2E Tests
        run: |
          cd frontend
          npx playwright test

      # 12. Upload Test Reports on Failure
      - name: Upload Playwright Test Report on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      # 12.5. Verify Sonar Token Presence
      - name: Verify Sonar Token Presence
        if: always()
        run: |
          CLEANED_TOKEN=$(echo "${{ secrets.SONAR_TOKEN }}" | xargs)
          if [ -z "$CLEANED_TOKEN" ]; then
            echo "::error::SONAR_TOKEN is empty! Please check your GitHub repository secrets."
            exit 1
          else
            echo "SONAR_TOKEN is present (length: ${#CLEANED_TOKEN} characters)."
            echo "SONAR_TOKEN=$CLEANED_TOKEN" >> $GITHUB_ENV
          fi

      # 13. SonarCloud Code Quality Scan
      - name: SonarCloud Scan
        if: always()
        run: |
          curl -sSLo sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip sonar-scanner.zip -d $HOME
          cd backend && mvn clean test jacoco:report
          cd ..
          
          $HOME/sonar-scanner-5.0.1.3006-linux/bin/sonar-scanner -Dsonar.projectKey=DoVietHoang2802_MiniFaceBook -Dsonar.organization=doviethoang2802 -Dsonar.host.url=https://sonarcloud.io -Dsonar.token="${{ env.SONAR_TOKEN }}" -Dsonar.branch.name=${{ github.head_ref || github.ref_name }}

      # 14. SonarCloud Quality Gate Check
      - name: SonarCloud Quality Gate Check
        uses: sonarsource/sonarqube-quality-gate-action@master
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        timeout-minutes: 5
